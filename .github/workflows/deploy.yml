name: Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: read

concurrency:
  group: deploy-k8s-workbench
  cancel-in-progress: true

env:
  IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

jobs:
  build:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.IMAGE_TAG }}

      - name: Build and push image
        run: |
          echo "${{ secrets.SCW_SECRET_KEY }}" | docker login rg.fr-par.scw.cloud \
            -u nologin --password-stdin
          docker build \
            -t rg.fr-par.scw.cloud/homectl/workbench:${{ env.IMAGE_TAG }} \
            -t rg.fr-par.scw.cloud/homectl/workbench:latest .
          docker push rg.fr-par.scw.cloud/homectl/workbench:${{ env.IMAGE_TAG }}
          docker push rg.fr-par.scw.cloud/homectl/workbench:latest

  deploy:
    needs: build
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.IMAGE_TAG }}

      - name: Setup Scaleway CLI and get kubeconfig
        uses: scaleway/action-scw@v0
        with:
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-organization-id: ${{ secrets.SCW_ORGANIZATION_ID }}
          default-project-id: ${{ secrets.SCW_PROJECT_ID }}
          args: k8s kubeconfig install ${{ secrets.K8S_CLUSTER_ID }} region=fr-par

      - name: Deploy to cluster
        run: |
          sed -i "s|\$IMAGE_TAG|${{ env.IMAGE_TAG }}|g" k8s/deployment.yml
          kubectl apply -f k8s/deployment.yml
          kubectl rollout status deployment/workbench -n homectl --timeout=300s

      # Same diagnostics as homectl-auth's deploy workflow: enough to see WHY a
      # rollout timed out (which container is stuck — pull error, missing secret
      # key, failing readiness probe) without it, "timed out waiting for the
      # condition" is the only signal.
      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "=== pods ==="
          kubectl get pods --namespace homectl -l app=workbench -o wide
          echo "=== describe ==="
          kubectl describe pods --namespace homectl -l app=workbench
          echo "=== events ==="
          kubectl get events --namespace homectl --sort-by=.lastTimestamp | tail -50
          # NOTE: deliberately does NOT dump `kubectl logs` — Actions logs may be
          # world-readable and request loggers can emit auth headers/cookies.
          # Pull pod logs manually with kubectl when needed.
