# TEMPORARY — CI for the claude/homectl-auth-0-2-0-* branch only. The remote
# session driving this branch has no read:packages token, so it cannot install
# @gagnatdev/homectl-auth-client locally; this mirrors ci.yaml's verify job to
# typecheck/test/build every push here. Deleted before the branch is merged
# (ci.yaml covers the PR).
name: Verify auth client 0.2.0 branch

on:
  workflow_dispatch:
  push:
    branches:
      - claude/homectl-auth-0-2-0-*

permissions:
  contents: read
  packages: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://npm.pkg.github.com/
          scope: "@gagnatdev"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend tests
        run: pnpm --filter @workbench/backend run test

      - name: Frontend unit tests and build
        run: |
          pnpm --filter @workbench/frontend run test:unit
          pnpm --filter @workbench/frontend run build

      - name: Backend build
        run: pnpm --filter @workbench/backend run build
