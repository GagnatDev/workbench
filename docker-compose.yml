services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: workbench
      POSTGRES_PASSWORD: workbench
      POSTGRES_DB: workbench
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workbench -d workbench"]
      interval: 5s
      timeout: 5s
      retries: 5

  # S3-compatible local object storage (stand-in for Scaleway Object Storage).
  # Used from Phase 3 (photo attachments). Console at http://localhost:9001.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: workbench
      MINIO_ROOT_PASSWORD: workbench-dev-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Creates the local bucket on startup, then exits.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 workbench workbench-dev-secret &&
      mc mb --ignore-existing local/homectl-workbench &&
      echo 'bucket ready';
      "

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://workbench:workbench@postgres:5432/workbench
      - PORT=8080
      # Dev/demo: skip the real auth service. Flip to homectl for real OAuth.
      - AUTH_MODE=dev
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
