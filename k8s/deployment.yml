apiVersion: apps/v1
kind: Deployment
metadata:
  name: workbench
  namespace: homectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workbench
  template:
    metadata:
      labels:
        app: workbench
    spec:
      containers:
        - name: workbench
          image: rg.fr-par.scw.cloud/homectl/workbench:$IMAGE_TAG
          ports:
            - containerPort: 8080
          # DATABASE_URL, AUTH_MODE, WORKBENCH_CLIENT_SECRET, S3_* live in this secret.
          envFrom:
            - secretRef:
                name: workbench-secrets
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: workbench
  namespace: homectl
spec:
  selector:
    app: workbench
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workbench
  namespace: homectl
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - workbench.homectl.no
      secretName: workbench-tls
  rules:
    - host: workbench.homectl.no
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: workbench
                port:
                  number: 80
